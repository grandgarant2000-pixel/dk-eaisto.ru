                        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required class="w-full p-6 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 transition font-black text-xl text-white">
                        <p id="phone-error" class="hidden text-red-500 text-xs font-bold mt-2 ml-2 absolute">Введите номер полностью</p>
                    </div>
                    <button type="submit" id="btn-lead" class="w-full bg-blue-600 text-white font-black py-7 rounded-2xl uppercase shadow-xl active:scale-95 transition-all italic mt-4">Связаться с мастером</button>

    <script>
        const token = "8718519861:AAEv5MGkCm-wwyAkiFP1t0eakyn8xbHZq5w";
        const chat_id = "1481119810";
        const phoneInput = document.getElementById('phone');

        phoneInput.addEventListener('focus', function() { if (this.value === '') this.value = '+7 '; });
        phoneInput.addEventListener('input', function (e) {
            let input = e.target.value.replace(/\D/g, ''); 
            if (input.startsWith('7') || input.startsWith('8')) input = input.substring(1);
            if (input.length === 0) { e.target.value = ''; return; }
            let formatted = '+7 ';
            if (input.length > 0) formatted += '(' + input.substring(0, 3);
            if (input.length >= 4) formatted += ') ' + input.substring(3, 6);
            if (input.length >= 7) formatted += '-' + input.substring(6, 8);
            if (input.length >= 9) formatted += '-' + input.substring(8, 10);
            e.target.value = formatted;
            document.getElementById('phone-error').classList.add('hidden');
            phoneInput.classList.remove('border-red-500');
        });

        document.getElementById('lead-form').onsubmit = async (e) => {
            e.preventDefault();
            const rawPhone = phoneInput.value.replace(/\D/g, '');
            if (rawPhone.length !== 11) {
                document.getElementById('phone-error').classList.remove('hidden');
                phoneInput.classList.add('border-red-500');
                return;
            }
            const b = document.getElementById('btn-lead');
            b.disabled = true; b.innerText = "ОТПРАВКА...";
            const cleanPhone = '+' + rawPhone;
            const msg = `🚀 <b>ЛИД: ТАХОГРАФЫ (СКЗИ)</b>\n📞 Тел: <code>${cleanPhone}</code>`;
            try {
                let response = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&parse_mode=HTML&text=${encodeURIComponent(msg)}`);
                if (!response.ok) throw new Error('Код ошибки: ' + response.status);
                if (typeof ym !== 'undefined') { ym(107259265, 'reachGoal', 'lead_sent'); }
                document.getElementById('lead-form').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            } catch (err) { 
                alert("Ошибка! " + err.message); 
                b.disabled = false; 
                b.innerText = "СВЯЗАТЬСЯ С МАСТЕРОМ"; 
            }
        };
    </script>
