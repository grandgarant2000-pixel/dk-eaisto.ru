<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Данные для ЕАИСТО — АвтоДок РФ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        input, textarea { font-size: 16px !important; } 
        .upload-box { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .upload-box:active { transform: scale(0.96); }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div class="min-h-screen flex flex-col justify-center py-6 px-4">
        <div class="max-w-md mx-auto w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
            
            <div class="bg-[#0f172a] p-10 text-white relative">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-1.5 h-10 bg-blue-500 rounded-full"></div>
                    <h1 class="text-3xl font-black uppercase italic tracking-tighter">Данные авто</h1>
                </div>
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Шаг 1: Заполнение анкеты</p>
            </div>

            <div class="p-8 md:p-10">
                <div id="full-step-1">
                    <form id="full-form" class="space-y-6">
                        
                        <div class="space-y-2">
                            <label class="text-[11px] font-black uppercase text-slate-400 pl-1 tracking-widest">Email для готовой карты</label>
                            <input type="email" id="finish_email" placeholder="mail@example.com" required 
                                class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition font-bold text-lg text-blue-600">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[11px] font-black uppercase text-slate-400 pl-1 tracking-widest">Пробег (км)</label>
                                <input type="number" id="mileage" placeholder="150 000" required 
                                    class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition font-black text-lg">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[11px] font-black uppercase text-slate-400 pl-1 tracking-widest">Марка шин</label>
                                <input type="text" id="tires" placeholder="Nokia" required 
                                    class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition font-black text-lg">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-xs font-black text-slate-900 uppercase text-center tracking-widest italic">Нажмите на блоки для фото:</h3>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <label class="upload-box flex flex-col items-center justify-center py-8 bg-slate-50 border-2 border-slate-200 rounded-[2rem] cursor-pointer hover:border-blue-500 hover:bg-blue-50">
                                    <span class="text-4xl mb-3">📄</span>
                                    <span class="text-[12px] font-black text-slate-900 uppercase leading-tight text-center">СТС<br>ЛИЦЕВАЯ</span>
                                    <input type="file" id="sts_1" accept="image/*" required class="hidden" onchange="updateLabel(this)">
                                </label>
                                <label class="upload-box flex flex-col items-center justify-center py-8 bg-slate-50 border-2 border-slate-200 rounded-[2rem] cursor-pointer hover:border-blue-500 hover:bg-blue-50">
                                    <span class="text-4xl mb-3">📑</span>
                                    <span class="text-[12px] font-black text-slate-900 uppercase leading-tight text-center">СТС<br>ОБОРОТ</span>
                                    <input type="file" id="sts_2" accept="image/*" required class="hidden" onchange="updateLabel(this)">
                                </label>
                                <label class="upload-box flex flex-col items-center justify-center py-8 bg-slate-50 border-2 border-slate-200 rounded-[2rem] cursor-pointer hover:border-blue-500 hover:bg-blue-50">
                                    <span class="text-4xl mb-3">📸</span>
                                    <span class="text-[12px] font-black text-slate-900 uppercase leading-tight text-center">АВТО<br>СПЕРЕДИ</span>
                                    <input type="file" id="car_front" accept="image/*" required class="hidden" onchange="updateLabel(this)">
                                </label>
                                <label class="upload-box flex flex-col items-center justify-center py-8 bg-slate-50 border-2 border-slate-200 rounded-[2rem] cursor-pointer hover:border-blue-500 hover:bg-blue-50">
                                    <span class="text-4xl mb-3">🖼️</span>
                                    <span class="text-[12px] font-black text-slate-900 uppercase leading-tight text-center">АВТО<br>СЗАДИ</span>
                                    <input type="file" id="car_back" accept="image/*" required class="hidden" onchange="updateLabel(this)">
                                </label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[11px] font-black uppercase text-slate-400 pl-1 tracking-widest">Комментарий (если есть)</label>
                            <textarea id="comment" placeholder="Любые уточнения..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition font-medium h-24 text-base"></textarea>
                        </div>

                        <button type="submit" id="btn-full" class="w-full bg-blue-600 text-white font-black py-7 rounded-[2rem] uppercase tracking-widest shadow-2xl shadow-blue-200 active:scale-95 transition-all italic">Отправить специалисту</button>
                    </form>
                </div>

                <div id="full-step-2" class="hidden text-center py-4">
                    <div class="w-20 h-20 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-xl">💳</div>
                    <h2 class="text-3xl font-black uppercase italic mb-2 tracking-tighter">Оплата СБП</h2>
                    <p class="text-slate-500 font-bold text-sm mb-8 uppercase tracking-widest">По номеру телефона</p>

                    <div class="bg-slate-900 p-8 rounded-[2.5rem] mb-8 shadow-2xl border-b-4 border-blue-500">
                        <p class="text-2xl font-black text-white mb-1">+7 917 982-77-33</p>
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Павел Р. (СБЕРБАНК)</p>
                    </div>

                    <form id="receipt-form" class="space-y-4">
                        <label class="block p-8 border-4 border-dashed border-slate-100 rounded-[2.5rem] cursor-pointer hover:bg-blue-50 transition-colors bg-slate-50">
                            <span class="block text-3xl mb-2">🧾</span>
                            <span id="receipt-text" class="block text-[11px] font-black text-slate-9
